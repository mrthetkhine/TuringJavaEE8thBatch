<html xmlns="http://www.w3.org/1999/xhtml"
  lang="en"
  xmlns:th="http://www.thymeleaf.org" 
>
<body>
	<section th:replace="fragments/header :: header"/>
	<section layout:fragment="content">
	
	
	<form th:object="${book}"
		method="POST">
		<div class="form-group">
		    <label for="title">Title</label>
		    <input type="text" 
			id="title" 
			th:field="*{title}"
			class="form-control"placeholder="Enter Title">
			
		 </div>
		 <div>
			<div 
				class="error"
				th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
			</div>
		</div>
		<div class="form-group">
		    <label for="author">Author</label>
		    <input type="text" 
			id="author" 
			th:field="*{author}"
			class="form-control"placeholder="Enter Author">
		    
		 </div>
		 <div>
			<div 
				class="error"
				th:if="${#fields.hasErrors('author')}" th:errors="*{author}">
			</div>
		</div>
		 <div class="form-group">
 		    <label for="year">Year</label>
 		    <input type="text" 
			id="year" 
			th:field="*{year}"
			class="form-control"placeholder="Enter Year">
 		    
 		 </div>
		 <div>
			<div 
				class="error"
				th:if="${#fields.hasErrors('year')}" th:errors="*{year}">
			</div>
		</div>
		 <div class="form-group">
			<button type="submit" class="btn btn-primary">Submit</button>
		 </div>
	</form>
	</section>
	<section th:replace="fragments/footer :: footer"/>
</body>
</html>
